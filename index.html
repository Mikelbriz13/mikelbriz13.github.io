<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mikel Briz | Portfolio</title>

    <link rel="stylesheet" href="style.css">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>

<body>

<canvas id="bg-canvas"></canvas>

<!-- NAV -->
<nav>
    <div class="logo">MB</div>

    <ul class="nav-links" id="nav-links">
        <li><a href="#about" id="nav-about"></a></li>
        <li><a href="#skills" id="nav-skills"></a></li>
        <li><a href="#learning" id="nav-learning"></a></li>
        <li><a href="#timeline" id="nav-timeline"></a></li>
        <li><a href="#projects" id="nav-projects"></a></li>
        <li><a href="#contact" id="nav-contact"></a></li>
    </ul>

    <button id="language-btn">EN</button>

    <div class="menu-toggle" id="menu-toggle">☰</div>
</nav>

<!-- HERO -->
<section id="hero">

    <div class="hero-wrapper">

        <h1 class="hero-name">
            <span id="hero-intro"></span>
            <span class="hero-name-highlight">Mikel Briz</span>
        </h1>

        <h2 class="hero-role" id="hero-role"></h2>

        <p class="hero-description" id="hero-description"></p>

        <a href="assets/Mikel_Briz_CV(EN).pdf" class="btn">CV</a>

    </div>

</section>

<!-- ABOUT -->
<section id="about">

    <h2 id="about-title"></h2>

    <div class="about-box">
        <p id="about-p1"></p>
        <p id="about-p2"></p>
        <p id="about-p3"></p>
    </div>

</section>

<!-- TIMELINE -->
<section id="timeline">

    <h2 id="timeline-title"></h2>

    <div class="timeline-tabs">
        <button class="tab active" data-year="2019">2019</button>
        <button class="tab" data-year="2024">2024</button>
        <button class="tab" data-year="2025">2025</button>
        <button class="tab" data-year="2026">2026</button>
    </div>

    <div class="timeline-content-box">

        <div class="tab-content active" id="content-2019">
            <h3 id="t2019-title"></h3>
            <p id="t2019-text"></p>
        </div>

        <div class="tab-content" id="content-2024">
            <h3 id="t2024-title"></h3>
            <p id="t2024-text"></p>
        </div>

        <div class="tab-content" id="content-2025">
            <h3 id="t2025-title"></h3>
            <p id="t2025-text"></p>
        </div>

        <div class="tab-content" id="content-2026">
            <h3 id="t2026-title"></h3>
            <p id="t2026-text"></p>
        </div>

    </div>

</section>

<!-- PROJECTS -->
<section id="projects">
    <h2 id="projects-title"></h2>
    <div class="project-box" id="projects-text"></div>
</section>

<!-- SKILLS -->
<section id="skills">
    <h2 id="skills-title"></h2>

    <div class="skills-container">
        <div class="skill">Python</div>
        <div class="skill">SQL</div>
        <div class="skill">Machine Learning</div>

</section>

<!-- LEARNING -->
<section id="learning">
    <h2 id="learning-title"></h2>

    <div class="learning-container">
        <span>SQL</span>
        <span>Machine Learning</span>
    </div>
</section>

<!-- CONTACT -->
<section id="contact">

    <h2 id="contact-title"></h2>

    <p id="contact-text"></p>

    <div class="contact-buttons">

        <a href="https://github.com/mikelbriz13" class="contact-btn">GitHub</a>
        <a href="mailto:mikelbriz@gmail.com" class="contact-btn">Email</a>
        <a href="https://www.linkedin.com" class="contact-btn">LinkedIn</a>

    </div>

</section>

<footer>
    <p id="footer-text"></p>
</footer>

<script src="translations.js"></script>
<script src="script.js"></script>

</body>
